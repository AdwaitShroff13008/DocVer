<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocVerControl - Auth</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="grain-overlay"></div>
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="logo">DocVer<span>Control</span></h1>
            <p class="subtitle">Secure versioning for your documents</p>
            
            <div class="tab-container">
                <button class="tab active" onclick="switchTab('login')">Login</button>
                <button class="tab" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required placeholder="you@domain.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn primary-btn">Login</button>
                <div class="error-msg" id="loginError"></div>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form hidden" onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" required placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="regUsername" required placeholder="johndoe123">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" required placeholder="you@domain.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn primary-btn">Create Account</button>
                <div class="error-msg" id="regError"></div>
            </form>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard.html';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.add('hidden'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.remove('hidden');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
